<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>日本旅行 — Japan Trip Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Zen+Maru+Gothic:wght@500;700;900&family=DotGothic16&family=Inter:wght@400;500;700;900&family=Reggae+One&family=Yusei+Magic&family=RocknRoll+One&display=swap" rel="stylesheet"/>
<style>
  /* Mini map détaillée par ville */
  .city-mini-map {
    width: 100%; aspect-ratio: 16/9;
    background: #fff5d9; border:3px solid var(--ink); border-radius:10px;
    position:relative; overflow:hidden;
  }
  .city-mini-pin {
    position:absolute; transform: translate(-50%, -100%);
    cursor:pointer; transition:transform .2s;
  }
  .city-mini-pin:hover { transform: translate(-50%, -100%) scale(1.2); z-index:5; }
  @media (max-width: 900px) { .map-grid { grid-template-columns: 1fr !important; } }
  .budget-bar {
    height: 18px; border:2.5px solid var(--ink); border-radius: 6px; overflow:hidden;
    background: #fff;
    background-image: repeating-linear-gradient(45deg, transparent, transparent 6px, rgba(0,0,0,.05) 6px, rgba(0,0,0,.05) 12px);
  }
  .budget-bar .fill {
    height:100%; background: repeating-linear-gradient(45deg, var(--pink), var(--pink) 6px, #ff80b8 6px, #ff80b8 12px);
    transition: width .3s;
  }
  .filter-chip {
    padding: 5px 10px; border:2px solid var(--ink); border-radius:999px;
    font-family:'DotGothic16', monospace; font-size:11px; cursor:pointer;
    background:#fff; box-shadow: 2px 2px 0 var(--ink);
    transition: all .12s;
  }
  .filter-chip.active { background: var(--ink); color: var(--yellow); transform: translate(-1px,-1px); }
  .filter-chip:hover:not(.active) { background: var(--yellow); }

  .day-card {
    border: 2.5px solid var(--ink); border-radius: 10px; padding: 10px 12px;
    background: #fff; box-shadow: 3px 3px 0 var(--ink); margin-bottom: 10px;
  }
  .done-line { text-decoration: line-through; opacity: .6; }
</style>
</head>
<body data-theme="light" data-anim="on">
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
